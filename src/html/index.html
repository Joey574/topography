<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Earth Topography Viewer</title>
  <link rel="stylesheet" href="static/css/style.css">
</head>
<body>

<header class="header">
  <div>
    <h1>EARTH TOPOGRAPHY VIEWER</h1>
  </div>
  <div class="stats">
    <div><span class="stat-label">ZOOM:</span> <span id="zoom-stat">5.00</span></div>
    <div><span class="stat-label">VERTS:</span> <span id="verts-stat">0</span></div>
    <div><span class="stat-label">FPS:</span> <span id="fps-stat">0</span></div>
  </div>
</header>

<main class="viewer-wrapper">
  <div class="control-panel">
    <h3 class="panel-title">Controls</h3>
    <button id="fetch-btn">Fetch Topography Data</button>

    <div class="control-group">
      <label>Displacement Scale: <span id="displacement-value">0.10</span></label>
      <input type="range" id="displacement-slider" min="0" max="1" step="0.01" value="0.10">
    </div>

    <div class="control-group">
      <label>Resolution: <span id="resolution-value">{{ .MIN_RESOLUTION }}</span></label>
      <input type="range" id="resolution-slider" min="{{ .MIN_RESOLUTION }}" max="{{ .MAX_RESOLUTION }}" step="{{ .STEP_VALUE }}" value="{{ .MIN_RESOLUTION }}">
    </div>

    <div class="control-group">
      <label>Sphere Color</label>
      <input type="color" id="color-picker" value="#2a5784">
    </div>

    <label class="checkbox-label">
      <input type="checkbox" id="wireframe-toggle"> Wireframe Mode
    </label>

    <label class="checkbox-label">
      <input type="checkbox" id="autorotate-toggle"> Auto Rotate
    </label>
  </div>

  <div class="instructions">
    <div class="instructions-title">CONTROLS</div>
    <div><span class="desktop-only">Left Click + Drag</span><span class="mobile-only">1-Finger Drag</span>: Rotate</div>
    <div><span class="desktop-only">Right Click + Drag</span><span class="mobile-only">2-Finger Drag</span>: Pan</div>
    <div><span class="desktop-only">Scroll</span><span class="mobile-only">Pinch</span>: Zoom</div>
  </div>

  <div id="canvas-container"></div>
</main>

<footer class="site-footer">
    <div class="footer-container">
        <div class="footer-info">
            <p>&copy; 2026 Joey Soroka. All rights reserved.</p>
        </div>

        <nav class="footer-nav">
            <ul class="footer-links">
                <li><a href="/">Home</a></li>
                <li><a href="/about">About</a></li>
                <li><a href="/contact">Contact</a></li>
            </ul>
        </nav>

        <nav class="footer-legal">
            <ul class="footer-links">
                <li><a href="/tos">Terms</a></li>
                <li><a href="/privacy">Privacy</a></li>
                <li><a href="/cookies">Cookies</a></li>
                <li><a href="/accessibility">Accessibility</a></li>
            </ul>
        </nav>
    </div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="static/js/script.js"></script>
</body>
</html>
