<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Earth Topography Viewer</title>
  <link rel="stylesheet" href="static/css/style.css">
  <link rel="apple-touch-icon" href="favicon.ico">
</head>
<body>

<!-- Header -->
<div class="header">
  <div>
    <h1>EARTH TOPOGRAPHY VIEWER</h1>
  </div>
  <div class="stats">
    <div><span class="stat-label">ZOOM:</span> <span id="zoom-stat">5.00</span></div>
    <div><span class="stat-label">VERTS:</span> <span id="verts-stat">0</span></div>
    <div><span class="stat-label">FPS:</span> <span id="fps-stat">0</span></div>
  </div>
</div>

<!-- Control Panel -->
<div class="control-panel">
  <h3 class="panel-title">Controls</h3>

  <button id="fetch-btn">Fetch Topography Data</button>

  <div class="control-group">
    <label>Displacement Scale: <span id="displacement-value">0.10</span></label>
    <input type="range" id="displacement-slider" min="0" max="1" step="0.01" value="0.10">
  </div>

  <div class="control-group">
    <label>Resolution: <span id="resolution-value">{{ .MIN_RESOLUTION }}</span></label>
    <input type="range" id="resolution-slider" min="{{ .MIN_RESOLUTION }}" max="{{ .MAX_RESOLUTION }}" step="{{ .MIN_RESOLUTION }}" value="{{ .MIN_RESOLUTION }}">
  </div>

  <div class="control-group">
    <label>Sphere Color</label>
    <input type="color" id="color-picker" value="#2a5784">
  </div>

  <label class="checkbox-label">
    <input type="checkbox" id="wireframe-toggle">
    Wireframe Mode
  </label>

  <label class="checkbox-label">
    <input type="checkbox" id="autorotate-toggle">
    Auto Rotate
  </label>
</div>

<!-- Instructions -->
<div class="instructions">
  <div class="instructions-title">CONTROLS</div>
  <div>Left Click + Drag: Rotate</div>
  <div>Right Click + Drag: Pan</div>
  <div>Scroll: Zoom</div>
</div>

<!-- 3D Canvas -->
<div id="canvas-container"></div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="static/js/script.js"></script>

</body>
</html>
