<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Earth Topography Viewer</title>
  <link rel="stylesheet" href="static/css/style.css">
</head>
<body>

<!-- Header -->
<div class="header">
  <div>
    <h1>EARTH TOPOGRAPHY VIEWER</h1>
  </div>
  <div class="stats">
    <div><span class="stat-label">ZOOM:</span> <span id="zoom-stat">5.00</span></div>
    <div><span class="stat-label">VERTS:</span> <span id="verts-stat">0</span></div>
    <div><span class="stat-label">FPS:</span> <span id="fps-stat">0</span></div>
  </div>
</div>

<!-- Control Panel -->
<div class="control-panel">
  <h3 class="panel-title">Controls</h3>

  <div class="control-group">
    <label>Backend Endpoint</label>
    <input type="text" id="backend-url" value="http://localhost:8080/topography">
  </div>

  <button id="fetch-btn">Fetch Topography Data</button>

  <div class="control-group">
    <label>Displacement Scale: <span id="displacement-value">0.10</span></label>
    <input type="range" id="displacement-slider" min="0" max="1" step="0.01" value="0.10">
  </div>

  <div class="control-group">
    <label>Resolution: <span id="resolution-value">128</span></label>
    <input type="range" id="resolution-slider" min="32" max="8192" step="32" value="128">
  </div>

  <div class="control-group">
    <label for="smoothing-slider">Smoothing: <span id="smoothing-value">1</span></label>
    <input type="range"  id="smoothing-slider"  min="0"  max="3"  step="1"  value="1">
  </div>

  <div class="control-group">
    <label>Sphere Color</label>
    <input type="color" id="color-picker" value="#2a5784">
  </div>

  <label class="checkbox-label">
    <input type="checkbox" id="wireframe-toggle">
    Wireframe Mode
  </label>

  <label class="checkbox-label">
    <input type="checkbox" id="autorotate-toggle">
    Auto Rotate
  </label>
</div>

<!-- Instructions -->
<div class="instructions">
  <div class="instructions-title">CONTROLS</div>
  <div>Left Click + Drag: Rotate</div>
  <div>Right Click + Drag: Pan</div>
  <div>Scroll: Zoom</div>
</div>

<!-- 3D Canvas -->
<div id="canvas-container"></div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="static/js/script.js"></script>

</body>
</html>
